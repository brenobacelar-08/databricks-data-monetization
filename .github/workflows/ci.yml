name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linter
        run: pip install ruff

      # Lint sem executar (PySpark não está disponível no runner)
      - name: Ruff lint notebooks & src
        run: ruff check notebooks/ src/ bigquery/ --ignore E501,F401

  validate-sql:
    name: Validate SQL syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install sqlfluff
        run: pip install sqlfluff

      - name: Lint SQL (Databricks dialect)
        run: |
          sqlfluff lint notebooks/04_bi_queries.sql \
            --dialect sparksql \
            --rules L003,L010,L036 \
            || true   # Non-blocking por enquanto; remova "|| true" quando quiser enforced
